# LogiBridge Ansible Inventory
# Real production edge nodes go under [edge_nodes].
# The [demo] group is used by the simulation scripts and by anyone wanting to
# run the playbook locally without a fleet of trucks.

[edge_nodes]
# Uncomment and edit for real deployment. One line per refrigerated truck.
# truck-edge-01 ansible_host=192.168.10.11 ansible_user=logibridge
# truck-edge-02 ansible_host=192.168.10.12 ansible_user=logibridge
# truck-edge-03 ansible_host=192.168.10.13 ansible_user=logibridge

[edge_nodes:vars]
ansible_ssh_private_key_file=~/.ssh/logibridge_deploy_key
ansible_python_interpreter=/usr/bin/python3
mqtt_broker_host=ops.logibridge.example.com
mqtt_broker_port=1883

# Local/demo target — used when running against the machine running Ansible.
[demo]
localhost ansible_connection=local
